<!DOCTYPE html>
<html>
    <head>
        <title>Paper Types</title>
    </head>
    <body>
        <link rel="stylesheet" href="styles.css">
        <div class="slider">
            <div class="product">
                <img class="product-img" src="img/prod/glossy.jpg" alt="Glossy">
                <div class="overlay"><p class="overlay-text">Very Glossy</p></div>
                <h3 class="paper-type">Glossy</h3>
            </div>
            <div class="product">
                <img class="product-img" src="img/prod/matte.jpg" alt="Matte">
                <div class="overlay"><p class="overlay-text">Just like those of paper bag bro</p></div>
                <h3 class="paper-type">Matte</h3>
            </div>
            <div class="product">
                <img class="product-img" src="img/prod/satin.jpg" alt="Silk-coated (Satin)">
                <div class="overlay"><p class="overlay-text">Premium smooth paper</p></div>
                <h3 class="paper-type">Silk-coated (Satin)</h3>
            </div>
        </div>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Forms - Papa Ferd's Printing Shop</title>
    </head>
    <body style="background-image: url(img/bg1.jpg); background-size: cover;">
        <div id="shared-placeholder"></div>
        <script src="shared.js" defer></script>
        <div class="form">
            <form action="database.php" method="post">
                <div class="t-inputarea">
                    <label for="name">Name</label><br>
                    <input type="text" id="name" name="name" required>
                </div>
                <div style="margin-bottom: 3%;"></div>
                <div class="t-inputarea">
                    <label for="email">Email</label><br>
                    <input type="email" id="email" name="email" required>
                </div>
                <div style="margin-bottom: 3%;"></div>
                <div class="inputarea">
                    <label for="product">Product:</label><br>
                    <select id="product" name="product" required>
                        <option value="">Choose a product</option>
                        <option value="Photo TIles">Photo Tile</option>
                        <option value="Photo Frames">Photo Frame</option>
                        <option value="Photo Posters">Photo Frame</option>
                        <option value="Photo Print">Photo Print</option>
                        <option value="Sticker Labels">Sticker Label</option>
                        <option value="Thank You Cards">Thank You Cards</option>
                        <option value="Wrapping Paper">Wrapping Paper</option>
                        <option value="Food Wrapping Paper">Food Wrapping Paper</option>
                        <option value="Business/Calling Cards">Business/Calling Card</option>
                        <option value="Flyer">Flyer</option>
                        <option value="Poster">Poster</option>
                        <option value="Letterhead">Letterhead</option>
                        <option value="Envelopes">Envelopes</option>
                        <option value="Postcard">Postcard</option>
                        <option value="Presentation Poster">Presentation Poster</option>
                        <option value="Brochure">Brochure</option>
                        <option value="Placemat">Placemat</option>
                        <option value="Menu">Menu</option>
                        <option value="Door Hanger">Door Hanger</option>
                        <option value="Stickers">Stickers</option>
                        <option value="Roll-up Banner">Roll-up Banner</option>
                        <option value="Tickers">Tickets</option>
                    </select>
                </div>
                <div style="margin-bottom: 3%;"></div>
                <div class="inputarea">
                    <label for="quantity">Quantity:</label><br>
                    <input type="number" id="quantity" name="quantity" min="1" value="1" required>
                </div>
                <div style="margin-bottom: 3%;"></div>
                <div class="t-inputarea">
                    <label style="transform: translateY(-100%)" for="address">Address</label><br>
                    <textarea id="address" name="address" rows="2" cols="30" required></textarea>
                </div><br>
                <button type="submit">Order</button>
            </form>
        </div>
        <div id="footer-placeholder"></div>
    </body>
</html>
